- name: app_setup
  ansible.builtin.import_role:
    name: app_setup.yaml
    tasks_from: common

- name: nodejs_setup
  ansible.builtin.import_role:
    name: nodejs_setup.yaml
    tasks_from: common

- name: systemd_setup
  ansible.builtin.import_role:
    name: systemd_setup.yaml
    tasks_from: common

- name: Copy mongo repo file
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Install MongoDB Host
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: Check data loded or not
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: Loading data to Mongodd
  ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout | int < 0 

- name: start catalogue
  ansible.builtin.service:
    name: catalogue
    state: restarted
    enabled: yes
    
